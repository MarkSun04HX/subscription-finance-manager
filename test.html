<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubTrack — Student Subscription Dashboard</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --accent: #ff4d4d;
            --text-main: #2d3436;
            --text-muted: #636e72;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin-bottom: 5px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5em; }

        /* STATS CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover { transform: translateY(-5px); }
        .stat-card h3 { color: var(--text-muted); font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-card p { font-size: 2em; font-weight: 800; color: var(--secondary); margin: 0; }

        /* CALENDAR */
        .calendar-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .calendar-header h2 { margin: 0; font-size: 1.5em; color: var(--text-main); }

        .nav-btn {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .nav-btn:hover { background: var(--primary); color: white; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-label { font-weight: bold; color: var(--text-muted); font-size: 0.75em; text-align: center; padding-bottom: 10px; text-transform: uppercase; }
        
        .day {
            aspect-ratio: 1 / 1;
            background: #fdfdfd;
            border: 1px solid #f1f1f1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.95em;
            position: relative;
            transition: 0.2s;
        }

        .day:hover { background: #f8f9ff; border-color: var(--primary); }

        .day.today {
            background: #f0f3ff;
            border: 2px solid var(--primary);
            font-weight: bold;
        }

        .dot-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3px;
            margin-top: 5px;
            min-height: 8px;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            cursor: help;
        }

        /* FORM */
        .form-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .input-group { display: flex; flex-wrap: wrap; gap: 15px; }
        input, select, .add-btn { flex: 1; min-width: 150px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        input:focus { border-color: var(--primary); }

        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* TABLE */
        .sub-list {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; text-align: left; padding: 18px; color: var(--text-muted); font-size: 0.8em; letter-spacing: 1px; }
        td { padding: 18px; border-top: 1px solid #f1f1f1; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; }
        .urgent { background: #ffebeb; color: #e74c3c; }
        .warning { background: #fff8e6; color: #f39c12; }
        .safe { background: #ebfbee; color: #27ae60; }
        .del-btn { background: none; border: none; color: #dfe6e9; cursor: pointer; font-size: 1.2em; transition: 0.2s; }
        .del-btn:hover { color: #ff7675; }

        @media (max-width: 600px) {
            .input-group { flex-direction: column; }
            .day { font-size: 0.8em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>💸 SubTrack</h1>
        <p>Track your student budget & visualization payment cycles</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Monthly Spending</h3>
            <p id="totalMonthly">$0.00</p>
        </div>
        <div class="stat-card">
            <h3>Weekly Burn</h3>
            <p id="totalWeekly">$0.00</p>
        </div>
        <div class="stat-card">
            <h3>Up Next</h3>
            <p id="nextBillLabel">---</p>
        </div>
    </div>

    <div class="calendar-card">
        <div class="calendar-header">
            <h2 id="currentMonthYear">Loading...</h2>
            <div>
                <button class="nav-btn" onclick="changeMonth(-1)">‹ Previous</button>
                <button class="nav-btn" onclick="changeMonth(1)">Next ›</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="form-card">
        <h3>Add New Subscription</h3>
        <div class="input-group">
            <input type="text" id="subName" placeholder="Name (e.g. Spotify)">
            <input type="number" id="subCost" placeholder="Price ($)" step="0.01">
            <select id="subFreq">
                <option value="monthly">Monthly</option>
                <option value="weekly">Weekly</option>
            </select>
            <input type="date" id="subDate" title="Last Payment Date">
            <button class="add-btn" onclick="addSubscription()">Add Subscription</button>
        </div>
    </div>

    <div class="sub-list">
        <table>
            <thead>
                <tr>
                    <th>SERVICE</th>
                    <th>COST</th>
                    <th>FREQ</th>
                    <th>NEXT DATE</th>
                    <th>STATUS</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="subTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let subscriptions = JSON.parse(localStorage.getItem('mySubs')) || [];
    let currentViewDate = new Date();

    function addSubscription() {
        const name = document.getElementById('subName').value;
        const cost = parseFloat(document.getElementById('subCost').value);
        const freq = document.getElementById('subFreq').value;
        const lastDate = document.getElementById('subDate').value;

        if (!name || isNaN(cost) || !lastDate) {
            alert("Please fill all fields correctly!");
            return;
        }

        const newSub = { id: Date.now(), name, cost, freq, lastDate };
        subscriptions.push(newSub);
        saveAndRefresh();
        
        // Clear UI
        document.getElementById('subName').value = '';
        document.getElementById('subCost').value = '';
    }

    function calculateNextBill(lastDateStr, freq) {
        const lastDate = new Date(lastDateStr);
        const today = new Date();
        today.setHours(0,0,0,0);
        let nextDate = new Date(lastDate);

        // Logic to find the first future date relative to today
        while (nextDate <= today) {
            if (freq === 'monthly') {
                nextDate.setMonth(nextDate.getMonth() + 1);
            } else {
                nextDate.setDate(nextDate.getDate() + 7);
            }
        }
        return nextDate;
    }

    function changeMonth(offset) {
        currentViewDate.setMonth(currentViewDate.getMonth() + offset);
        render();
    }

    function deleteSub(id) {
        subscriptions = subscriptions.filter(s => s.id !== id);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('mySubs', JSON.stringify(subscriptions));
        render();
    }

    function render() {
        renderStatsAndTable();
        renderCalendar();
    }

    function renderStatsAndTable() {
        const tbody = document.getElementById('subTableBody');
        tbody.innerHTML = '';
        let totalM = 0, totalW = 0, upcoming = [];

        subscriptions.forEach(sub => {
            const nextBill = calculateNextBill(sub.lastDate, sub.freq);
            const daysLeft = Math.ceil((nextBill - new Date()) / (1000 * 60 * 60 * 24));
            
            if (sub.freq === 'monthly') { totalM += sub.cost; totalW += (sub.cost / 4.33); }
            else { totalW += sub.cost; totalM += (sub.cost * 4.33); }
            
            upcoming.push({ name: sub.name, days: daysLeft });

            let badgeClass = daysLeft <= 3 ? 'urgent' : (daysLeft <= 7 ? 'warning' : 'safe');
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${sub.name}</strong></td>
                    <td>$${sub.cost.toFixed(2)}</td>
                    <td style="text-transform: capitalize;">${sub.freq}</td>
                    <td>${nextBill.toLocaleDateString()}</td>
                    <td><span class="badge ${badgeClass}">${daysLeft} days left</span></td>
                    <td><button class="del-btn" onclick="deleteSub(${sub.id})">✕</button></td>
                </tr>
            `;
        });

        document.getElementById('totalMonthly').textContent = `$${totalM.toFixed(2)}`;
        document.getElementById('totalWeekly').textContent = `$${totalW.toFixed(2)}`;
        
        if (upcoming.length > 0) {
            const soonest = upcoming.sort((a,b) => a.days - b.days)[0];
            document.getElementById('nextBillLabel').textContent = `${soonest.name} in ${soonest.days}d`;
        } else {
            document.getElementById('nextBillLabel').textContent = "---";
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthYearLabel = document.getElementById('currentMonthYear');
        grid.innerHTML = '';

        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        
        monthYearLabel.textContent = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentViewDate);

        // Day Headers
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
            grid.innerHTML += `<div class="day-label">${day}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Padding for previous month days
        for (let i = 0; i < firstDay; i++) {
            grid.innerHTML += `<div></div>`;
        }

        // Render Actual Days
        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month, d);
            const dateStr = dateObj.toDateString();
            const isToday = dateStr === new Date().toDateString();
            
            // Check if any sub is due today
            let dots = '';
            subscriptions.forEach(sub => {
                const nextPay = calculateNextBill(sub.lastDate, sub.freq);
                if (nextPay.toDateString() === dateStr) {
                    dots += `<div class="dot" title="${sub.name}: Due Today"></div>`;
                }
            });

            grid.innerHTML += `
                <div class="day ${isToday ? 'today' : ''}">
                    ${d}
                    <div class="dot-container">${dots}</div>
                </div>
            `;
        }
    }

    // Run on startup
    render();
</script>

</body>
</html>
